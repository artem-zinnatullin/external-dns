name: Publish fork image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish to GitHub Container Registry
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish multi-arch image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/external-dns
          VERSION: ${{ inputs.image_tag }}
        run: make build.push/multiarch
